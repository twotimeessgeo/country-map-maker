<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수능 지리 유틸리티 포털</title>
    <meta
      name="description"
      content="지도 제작, 기후 비교, 지리 등급컷 예측을 한곳에서 여는 수능 지리 유틸리티 포털입니다."
    />
    <meta name="theme-color" content="#f4f1ea" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./tokens.css" />
    <link rel="stylesheet" href="./base.css" />
    <link rel="stylesheet" href="./components.css" />
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <div class="portal-shell">
      <header class="portal-topbar" aria-label="포털">
        <a class="portal-brand" href="./index.html" aria-label="수능 지리 유틸리티 포털 홈">
          <span>Geo Portal</span>
          <strong>수능 지리 유틸리티</strong>
        </a>
        <nav class="portal-nav" aria-label="도구 바로가기">
          <a href="./map.html">
            <i data-lucide="map"></i>
            <span>지도</span>
          </a>
          <a href="./tools/climate/index.html">
            <i data-lucide="cloud-sun"></i>
            <span>기후</span>
          </a>
          <a href="./tools/cut/index.html">
            <i data-lucide="calculator"></i>
            <span>컷</span>
          </a>
        </nav>
      </header>

      <main>
        <section class="portal-hero" aria-labelledby="portalTitle">
          <div class="portal-hero-copy">
            <p class="portal-kicker">TWOTIMESS GEOGRAPHY DESK</p>
            <h1 id="portalTitle">수능 지리 유틸리티 포털</h1>
            <div class="portal-command-row">
              <a class="portal-primary-action" href="./map.html">
                <i data-lucide="map"></i>
                <span>지도 제작기</span>
              </a>
              <a class="portal-secondary-action" href="./tools/climate/index.html">
                <i data-lucide="cloud-sun"></i>
                <span>기후 비교기</span>
              </a>
              <a class="portal-secondary-action" href="./tools/cut/index.html">
                <i data-lucide="calculator"></i>
                <span>컷 예측기</span>
              </a>
            </div>
          </div>
          <div class="portal-snapshot-grid" aria-label="도구 상태">
            <a class="portal-snapshot is-map" href="./map.html">
              <img src="./assets/portal-map.svg" alt="지도 제작기 미리보기" />
              <span>통계 지도</span>
            </a>
            <a class="portal-snapshot is-climate" href="./tools/climate/index.html">
              <img src="./assets/portal-climate.svg" alt="기후 비교기 미리보기" />
              <span>기후 그래프</span>
            </a>
            <a class="portal-snapshot is-cut" href="./tools/cut/index.html">
              <img src="./assets/portal-cut.svg" alt="컷 예측기 미리보기" />
              <span>등급컷</span>
            </a>
          </div>
        </section>

        <section class="portal-band" aria-labelledby="toolBoardTitle">
          <div class="portal-section-head">
            <div>
              <p class="portal-kicker">TOOLS</p>
              <h2 id="toolBoardTitle">작업 보드</h2>
            </div>
            <span class="portal-badge">정적 배포 준비</span>
          </div>

          <div class="tool-grid">
            <article class="tool-card">
              <a class="tool-media" href="./map.html">
                <img src="./assets/portal-map.svg" alt="통계 지도 제작 화면" />
              </a>
              <div class="tool-body">
                <div>
                  <p class="portal-kicker">MAP MACHINE</p>
                  <h3>투타임즈의 통계머신</h3>
                </div>
                <dl class="tool-facts">
                  <div>
                    <dt>범위</dt>
                    <dd>세계 · 대한민국</dd>
                  </div>
                  <div>
                    <dt>출력</dt>
                    <dd>SVG · PNG</dd>
                  </div>
                </dl>
                <a class="tool-open" href="./map.html">
                  <i data-lucide="arrow-up-right"></i>
                  <span>열기</span>
                </a>
              </div>
            </article>

            <article class="tool-card">
              <a class="tool-media" href="./tools/climate/index.html">
                <img src="./assets/portal-climate.svg" alt="기후 그래프 비교 화면" />
              </a>
              <div class="tool-body">
                <div>
                  <p class="portal-kicker">CLIMATE MACHINE</p>
                  <h3>투타임즈의 기후머신</h3>
                </div>
                <dl class="tool-facts">
                  <div>
                    <dt>버전</dt>
                    <dd>세계 · 한국</dd>
                  </div>
                  <div>
                    <dt>자료</dt>
                    <dd>1991-2020</dd>
                  </div>
                </dl>
                <a class="tool-open" href="./tools/climate/index.html">
                  <i data-lucide="arrow-up-right"></i>
                  <span>열기</span>
                </a>
              </div>
            </article>

            <article class="tool-card">
              <a class="tool-media" href="./tools/cut/index.html">
                <img src="./assets/portal-cut.svg" alt="지리 컷 예측 화면" />
              </a>
              <div class="tool-body">
                <div>
                  <p class="portal-kicker">CUT PREDICTOR</p>
                  <h3>지리 컷 예측기</h3>
                </div>
                <dl class="tool-facts">
                  <div>
                    <dt>과목</dt>
                    <dd>한지 · 세지</dd>
                  </div>
                  <div>
                    <dt>입력</dt>
                    <dd>20문항</dd>
                  </div>
                </dl>
                <a class="tool-open" href="./tools/cut/index.html">
                  <i data-lucide="arrow-up-right"></i>
                  <span>열기</span>
                </a>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      if (window.lucide) {
        window.lucide.createIcons();
      }
    </script>
  </body>
</html>
